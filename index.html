    naiyou:"情報通信機器等を用いた外来栄養食事指導料について、２回目以降に情報通信機器又は電話により追加的な指導を行った場合の区分を新設する",
    taiou:"", page:553 },

  { id:23, code:"Ⅲ-4-①",     category:"リハビリ算定", name:"退院時リハ指導料の見直し",
    naiyou:"対象患者を疾患別リハ算定患者に限定",
    taiou:"元々疾患別リハビリテーション料を算定している患者のみを対象に算定しており、影響なし", page:562 },

  { id:24, code:"Ⅲ-4-②",     category:"リハビリ算定", name:"医療機関外リハの上限見直し",

  { id:25, code:"Ⅲ-4-③",     category:"リハビリ算定", name:"疾患別リハ上限緩和対象の見直し",
    naiyou:"運動器リハ算定者を対象から削除\n上限緩和基準に手術日・急性増悪日を追加",

  { id:26, code:"Ⅲ-4-④",     category:"リハビリ算定", name:"訓練内容に応じた評価見直し",
    naiyou:"離床を伴わない個別療法20分以上は減算（90%）／1日2単位まで",
    taiou:"疑義解釈にあるが、少しでも離床を試みた場合は減算対象にならず、基本的には該当しない\n記録の書き方は注意（ベッド上でストレッチのみ実施した場合はダメ）", page:567 },

  { id:27, code:"Ⅲ-4-⑤",     category:"リハビリ算定", name:"リハ総合実施計画評価料の見直し",
    naiyou:"【リハビリテーション総合計画評価料】\n※レセプトシステムで初回、2回目の判定は自動化となる見込み\nリハビリテーション総合計画評価料１\n　イ 初回の場合 300点　ロ ２回目以降の場合 240点\nリハビリテーション総合計画評価料２\n　イ 初回の場合 240点　ロ ２回目以降の場合 196点\n※目標設定等支援・管理料（シート）廃止",
    taiou:"R8年度版 別紙様式21が使えるようになった\nこれまでの実施計画書も使用可能であるが、実施計画書と総合の内容が共通している書式であることや、目標設定等支援管理シートの内容が含まれるかたちとなったことから様式21を使用する方向。\n※疑義解釈にあるが、改定前までに総合計画評価料1もしくは2を算定していた場合、改定後はそれぞれ評価料1や2の2回目以降として算定する", page:570 },

  { id:28, code:"Ⅲ-4-⑥",     category:"リハビリ算定", name:"リンパ浮腫複合的治療料の見直し",
    naiyou:"実施時間ごとの評価に見直し",
    taiou:"該当なし", page:572 },

  { id:29, code:"Ⅲ-4-1-①",   category:"リハビリ算定", name:"早期・休日リハの推進",
    naiyou:"早期リハ加算：入院3日以内60点、4日目以降25点／休日リハ加算新設（30日目まで25点）\n早期リハビリテーション加算の評価を見直し、入院した日から起算して３日目以内は増点し、４日目以降は減点する（加算可能な期間は入院した日から起算して14日目まで）\n土日祝のリハビリ実施を評価する観点から、休日リハビリテーション加算を新設する。",
    taiou:"※レセプトシステムで自動判定される見込み\n休日のリハビリテーションに対して起算日から30日目までは25点が加算される", page:573 },

  // ── 疑義解釈項目 ──
  { id:30, code:"疑義1問27",   category:"疑義解釈", name:"FIM測定における研修受講の対象",
    naiyou:"FIMの測定に関わる職員を対象としたFIMの測定に関する研修の対象職員として、FIMの測定を担当する看護職員も該当するとされているが回復期リハビリテーション病棟入院料２及び４も同様か\n⇒FIMの測定を担当する看護職員も研修の対象",
    taiou:"", page:9 },

  { id:31, code:"疑義1問28",   category:"疑義解釈", name:"重症患者の範囲及び重症患者割合の基準",
    naiyou:"令和8年5月31日までに入棟又は入室した患者については、令和8年度診療報酬改定前の重症患者の範囲及び重症患者割合の基準を用いてよい。また、算出対象期間が令和8年5月と同年6月をまたぐ場合、新規入院患者のうち重症の患者である割合の基準については、令和8年度診療報酬改定後の基準を用いてよい。",
    taiou:"", page:9 },

  { id:32, code:"疑義1問29",   category:"疑義解釈", name:"高次脳機能障害者の退院支援（疑義）",
    naiyou:"具体的にどのような体制を指すのか\n⇒医療機関において、地域の様々な事業所のうち高次脳機能障害の患者に適したものに関する情報の把握を行ったうえで、全ての高次脳機能障害の患者の退院時に、患者及び家族等に、当該情報を提供できる状態をいう",
    taiou:"令和８年12月31日までは、速やかに情報提供ができるよう、情報の把握や整理を現に実施している場合も含む、とあるため準備していく", page:10 },

  { id:33, code:"疑義1問39",   category:"疑義解釈", name:"休日リハビリテーション加算（経過措置）",
    naiyou:"令和８年度診療報酬改定にて休日リハビリテーション加算が新設されたが、令和８年５月31日以前に入院し、同年６月１日以降も入院している患者に対して当該加算を算定する場合、起算日はどのように考えればよいか\n（答）休日リハビリテーション加算の起算日に相当する日付が令和8年5月31日以前であっても、当該日付を起算日と考え、6月1日以降、算定要件を満たす日に算定可能である",
    taiou:"（答）休日リハビリテーション加算の起算日に相当する日付が令和8年5月31日以前であっても、当該日付を起算日と考え、6月1日以降、算定要件を満たす日に算定可能である", page:12 },

  { id:34, code:"疑義1問40",   category:"疑義解釈", name:"廃用症候群リハビリテーション料（入院前安静）",
    naiyou:"入院中の患者の場合、急性疾患等に伴う安静とは、入院後に行われる必要があり、入院後に一定の安静期間がなければ算定できないのか\n（答）廃用症候群リハビリテーションの対象患者の要件は「急性疾患等に伴う安静」であり、必ずしも入院後の安静期間を要するものではない。入院前に発症した疾患により入院までに生じた安静期間により、入院時に既にFIM等の要件を満たす廃用を認めた場合は、入院初日であっても廃用症候群リハビリテーション料を算定することができる。なお、早期リハビリテーション加算の算定可能期間は、廃用症候群リハビリテーション料の算定開始日によらず、入院日から14日間であることに留意すること。",
    taiou:"", page:12 },

  { id:35, code:"疑義1問41",   category:"疑義解釈", name:"リハ総合計画評価料（転医後の算定区分）",
    naiyou:"他の保険医療機関でリハビリテーション総合計画評価料を算定した後に転医し、自院で同一の疾患についてリハビリテーション実施計画書を作成した場合は、「初回の場合」と「２回目以降の場合」のいずれの点数を算定すればよいか\n（答）当該保険医療機関において同一の疾患に対するリハビリテーションの実施にあたり初めてリハビリテーション総合計画評価料を算定する場合は、他の保険医療機関での算定の有無にかかわらず、「初回の場合」として算定する。",
    taiou:"", page:13 },

  { id:36, code:"疑義1問42",   category:"疑義解釈", name:"リハ総合計画評価料（起算日再設定後の算定区分）",
    naiyou:"同一疾患についてリハビリテーションの起算日が再設定された後に、再度リハビリテーション総合計画評価料を算定する際は、「初回の場合」と「２回目以降の場合」のいずれの点数を算定すればよいか\n（答）同一の疾患別リハビリテーション料であっても、新たな疾患の発症や疾患の再発・急性増悪等によってリハビリテーション起算日が再設定され、改めてリハビリテーション総合実施計画書を作成・評価等を行った場合には、「初回の場合」を算定する。",
    taiou:"", page:13 },

  { id:37, code:"疑義1問43",   category:"疑義解釈", name:"リハ総合計画評価料（説明内容の診療録記載）",
    naiyou:"リハビリテーション実施計画書又はリハビリテーション総合実施計画書の写しに説明日及び説明者の記載がない場合は診療録に記載することとされたが、リハビリテーション実施計画書又はリハビリテーション総合実施計画書を説明した後、説明の内容も診療録に記載する必要があるか。\n（答）不要。ただし、当該計画書の説明を行った際に、患者から当該計画に対する意見等、特に記載すべき事項がある場合は、診療録に記載すること",
    taiou:"", page:13 },

  { id:38, code:"疑義1問44",   category:"疑義解釈", name:"リハ総合計画評価料（改定前算定済みの場合）",
    naiyou:"令和8年5月31日以前にリハビリテーション総合計画評価料１又は２を算定し、同年6月1日以降に再度同じ区分の算定要件を満たした場合は、「初回の場合」と「２回目以降の場合」のいずれの点数を算定すべきか。\n（答）令和8年5月31日以前にリハビリテーション総合計画評価料１又は２を算定していた場合には、同年６月以降は、リハビリテーション総合計画評価料１又は２の２回目以降として算定する。",
    taiou:"", page:14 },

  { id:39, code:"疑義1問46",   category:"疑義解釈", name:"特別食加算（嚥下調整食）対象患者の範囲",
    naiyou:"特別食加算における嚥下調整食の対象となる「摂食機能又は嚥下機能が低下した患者」とは、内視鏡下嚥下機能評価や嚥下造影により嚥下機能の低下が確認できる者に限られるか。\n（答）内視鏡下嚥下機能評価や嚥下造影は必須ではないが、医師、看護師、言語聴覚士、管理栄養士等の多職種で評価を行う等により、適切な栄養量及び内容を有する嚥下調整食が必要であると医師が判断し、食事箋を発行した患者が対象である。",
    taiou:"", page:14 },

  { id:40, code:"疑義1問48",   category:"疑義解釈", name:"特別食加算（嚥下訓練食・経管栄養併用）",
    naiyou:"嚥下訓練のためにゼリー等の嚥下訓練食品を提供した場合や、嚥下調整食と経管栄養を併用している場合も、特別食加算は算定できるか\n（答）患者に必要な栄養量が、１食の献立として常食で提供される場合と同等に確保できていない嚥下調整食は算定できない",
    taiou:"", page:14 },

  { id:41, code:"疑義2問23",   category:"疑義解釈", name:"入院診療計画書の電磁的保存",
    naiyou:"入院診療計画書については、患者等に交付した文書の写しを診療録に添付することとされているが、電磁的方法により診療情報の記録及び保存を行っている場合には、診療録に患者等に交付したものと同じ内容の文書が電子媒体で保存されており、その文書を用いて説明を行った日及び説明者が記載されていることでよいか",
    taiou:"その通り", page:8 },

  { id:42, code:"疑義2問43",   category:"疑義解釈", name:"認知症ケア加算・身体的拘束最小化の研修兼用",
    naiyou:"認知症ケア加算に係る研修に身体的拘束最小化の内容を兼ねるものとした場合には、当該研修で両方の基準をいずれも満たすものと考えてよいか\n（答）当該研修が通則の身体的拘束最小化の基準に規定する研修内容を含むものである場合には、満たすものとすることができる。ただし、身体的拘束最小化の基準については、「認知症患者に係わる職員」だけでなく、「入院患者に係わる職員」が対象であることに留意すること",
    taiou:"", page:15 },

  { id:43, code:"疑義2問46",   category:"疑義解釈", name:"リハビリテーション実績指数（FIM歩行・トイレ動作）",
    naiyou:"「歩行・車椅子」及び「トイレ動作」の得点が５点以下から６点以上に上がった場合、FIM運動項目利得に１点を加えることとされているが、２項目のいずれも該当する必要があるのか、どちらか１項目が該当する場合でも１点を加えるのか\n（答）それぞれの項目が「入棟時に５点以下、かつ、退棟時に６点以上だった場合」にそれぞれ１点を加え、どちらか１項目の得点のみが該当する場合であっても、退棟時のFIM運動項目の得点から入棟時の得点を控除したものに１点を加える",
    taiou:"", page:15 },

  { id:44, code:"疑義2問47",   category:"疑義解釈", name:"重症患者の対象（高次脳機能障害の範囲）",
    naiyou:"高次脳機能障害と診断された患者には、標準的算定日数が180日となる対象として示されている高次脳機能障害を伴った重症脳血管障害のみでなく、高次脳機能障害を伴った頭部外傷、脳腫瘍、脳炎、急性脳症も含まれるか\n（答）含まれる",
    taiou:"", page:16 },

  { id:45, code:"疑義2問48",   category:"疑義解釈", name:"実績指数の算出方法・除外対象（令和8年7月以降）",
    naiyou:"令和８年７月以降にリハビリテーション実績指数を求めるに当たって、算出方法や除外対象患者をどのように考えればよいか\n令和８年５月31日までに入棟又は入室した患者の入棟又は入室月においては、令和８年度診療報酬改定前の基準を用いてよい\n※その他は資料参照",
    taiou:"", page:16 },

  { id:46, code:"疑義2問51",   category:"疑義解釈", name:"回復期リハ強化体制加算（退院前訪問指導の割合）",
    naiyou:"回復期リハビリテーション強化体制加算の施設基準において、退院前訪問指導の実施割合の計算対象となる「直近６か月間に自宅へ退院した患者」について、「自宅」とは患者の自宅のみを指すのか",
    taiou:"該当なし\n回復期リハビリテーション病棟入院料1のみ加算対象", page:17 },

  { id:47, code:"疑義2問61",   category:"疑義解釈", name:"退院後訪問栄養食事指導料（同日算定）",
    naiyou:"訪問看護ステーションの看護師に同行して患家等を訪問し、栄養管理に係る指導等を行った場合は、退院後訪問指導料又は在宅患者訪問看護・指導料等と同日に算定できるか\n（答）各指導料に規定する指導等の時間が重複しない場合は、算定できる",
    taiou:"", page:20 },

  { id:48, code:"疑義2問67",   category:"疑義解釈", name:"疾患別リハ（ポジショニングのみ実施の場合）",
    naiyou:"ベッド上から移動せずにポジショニング又は拘縮の予防等を主たる目的とした他動的な訓練のみを行う入院中の患者については「特定の患者」として取り扱うこととなったが、１単位の中で一部にそのような訓練が含まれるが、それ以外の訓練が適切に行われる場合は「特定の患者」に該当しないと考えてよいか\n（答）そのとおり",
    taiou:"", page:21 },

  { id:49, code:"疑義2問70",   category:"疑義解釈", name:"早期リハビリテーション加算（起算日・経過措置）",
    naiyou:"早期リハビリテーション加算の起算日の要件及び算定期間が変更となったが、令和８年５月31日以前に入院した患者の起算日及び算定可能日数については、具体的にどのように考えればよいか\n※資料参照",
    taiou:"", page:23 },

  { id:50, code:"疑義2問71",   category:"疑義解釈", name:"リハビリテーション実施計画書（情報通信機器による説明）",
    naiyou:"医師の指示を受けた理学療法士等が計画書を説明する場合にも情報通信機器等を用いてよいか\n（答）よい",
    taiou:"", page:24 },

  { id:51, code:"疑義2問73",   category:"疑義解釈", name:"リハビリテーション実施計画書（医師以外による説明の指示）",
    naiyou:"回復期リハビリテーション病棟以外では「医師の指示を受けた看護師、理学療法士、作業療法士若しくは言語聴覚士」が実施することが可能となったが、医師の指示はどのように受ければよいか。医師の指示について診療録への記載が必要か\n（答）リハビリテーション実施計画書（総合実施計画書）を作成した医師が他の職種による説明が可能と判断した症例については、当該医師が文書又は口頭で、計画書の内容を医師以外が行ってよい旨の指示を行うこと。なお、当該指示について必ずしも診療録への記載は要しない。",
    taiou:"", page:24 },

  { id:52, code:"疑義2問143",  category:"疑義解釈", name:"特別食加算（嚥下調整食）施設基準の研修",

const DATA = RAW_DATA.map(d => {
  const shurui = getShuruiFromCode(d.code);
  const cats = getCategories(d);
  // 疑義コードの項目は疑義解釈カテゴリも付与
  if (/^疑義/.test(d.code) && !cats.includes("疑義解釈")) cats.unshift("疑義解釈");
  return { ...d, shurui, categories: cats };
});

let activeCategory = "すべて";
let openIds = new Set();

function buildUrl(shurui, page) {
  if (!shurui || !page) return null;
  return (PDF_URLS[shurui] || PDF_URLS["答申"]) + "#page=" + page;
}

function getShuruiLabel(shurui) {
  if (shurui === "答申") return "答申";
  return "疑義解釈その" + shurui.replace("疑義","");
}

function render() {
  const kw = document.getElementById("searchInput").value.trim();
  const filtered = DATA.filter(d => {
    const catMatch = activeCategory === "すべて" || d.categories.includes(activeCategory);
    const kwMatch = !kw || [d.name, d.naiyou, d.taiou, d.code, d.category].some(s => s && s.includes(kw));
    return catMatch && kwMatch;
  });

  document.getElementById("countLabel").textContent = filtered.length + " 件表示中";
  const list = document.getElementById("list");
  if (!filtered.length) { list.innerHTML = '<div class="empty">該当する項目がありません</div>'; return; }

  const svgChevron = open => `<svg class="chevron${open?' open':''}" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
  const svgLink = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

  list.innerHTML = filtered.map(d => {
    const isOpen = openIds.has(d.id);
    const gaito = isGaitoNashi(d.taiou);
    const url = buildUrl(d.shurui, d.page);
    const summaryText = (d.naiyou||"").replace(/\n/g,"／").slice(0,42) + ((d.naiyou||"").length>42?"…":"");

    const taiouHtml = gaito
      ? `<div class="taiou-gaito">${d.taiou}</div>`
      : d.taiou
        ? `<div class="taiou-box">${d.taiou}</div>`
        : `<div class="taiou-empty">対応内容を確認中です</div>`;

    const refHtml = url ? `<a class="ref-link" href="${url}" target="_blank">${svgLink}${getShuruiLabel(d.shurui)} ${d.page}ページを開く</a>` : "";

    return `<div class="item${gaito?' gaito-nashi':''}">
      <div class="item-header" onclick="toggle(${d.id})">
        <span class="item-code">${d.code}</span>
        <div class="item-title-wrap">
          <div class="item-name">${d.name}</div>
          ${!isOpen?`<div class="item-summary">${summaryText}</div>`:""}
        </div>
        ${svgChevron(isOpen)}
      </div>
      <div class="item-body${isOpen?' open':''}">
        <div class="section-label">改定内容</div>
        <div class="section-content">${d.naiyou}</div>
        <div class="section-label" style="margin-top:14px">当院の対応</div>
        ${taiouHtml}
        ${refHtml}
      </div>
    </div>`;
  }).join("");
}

function toggle(id) {
  openIds.has(id) ? openIds.delete(id) : openIds.add(id);
  render();
}

function setCategory(c) {
  activeCategory = c;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.toggle("active", b.dataset.cat===c));
  render();
}

function initFilters() {
  document.getElementById("filterBar").innerHTML = CATEGORY_ORDER.map(c =>
    `<button class="filter-btn${c===activeCategory?' active':''}" data-cat="${c}" onclick="setCategory('${c}')">${c}</button>`
  ).join("");
}

initFilters();
render();
</script>
</body>
</html>
